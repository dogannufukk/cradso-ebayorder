<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Verification Code</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f7; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7; padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background-color:#2563eb; padding:32px 40px; text-align:center;">
              <h1 style="margin:0; color:#ffffff; font-size:24px; font-weight:700;">Your Verification Code</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <p style="margin:0 0 16px; color:#374151; font-size:16px; line-height:1.6;">
                Hello <strong>{{customer_name}}</strong>,
              </p>
              <p style="margin:0 0 24px; color:#374151; font-size:16px; line-height:1.6;">
                Your verification code for the Design Portal is:
              </p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
                <tr>
                  <td align="center">
                    <div style="display:inline-block; background-color:#f0f4ff; padding:24px 40px; border-radius:12px; border:1px solid #dbeafe;">
                      <span style="font-size:48px; font-weight:700; letter-spacing:12px; color:#1e40af; font-family:'Courier New', Courier, monospace;">{{otp_code}}</span>
                    </div>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 16px; color:#374151; font-size:16px; line-height:1.6;">
                This code expires in <strong>60 seconds</strong>.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px; background-color:#f9fafb; border-top:1px solid #e5e7eb; text-align:center;">
              <p style="margin:0; color:#9ca3af; font-size:12px;">If you didn't request this code, please ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
